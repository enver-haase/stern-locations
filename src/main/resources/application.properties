spring.application.name=sternmap

# Pull Stern credentials from the same file the leaderboards app uses.
# Override on the command line or via env vars (LEADERBOARDS_STERN_USERNAME=...) if you prefer.
spring.config.import=optional:file:${user.home}/stern-home-leaderboards.properties

# Sensible defaults; override in the properties file above.
server.port=8080

# Disable Vaadin's startup launch-browser nag.
vaadin.launch-browser=false

# Pin to a known location header for unauthenticated calls.
leaderboards.default-country=DE
leaderboards.default-continent=EU

# Multi-venue augmentation via the public Pinball Map community API. Stern's
# own /nearby_leaderboards/ endpoint can only surface one venue per call (proved
# 2026-05-29; see README). Set to false to fall back to Stern-only single-venue
# display.
pinballmap.enabled=false
# When pinballmap is enabled, optionally filter to is_stern_army=true to mirror
# sternpinball.com/stern-army-locator/ (US-centric — produces 0 venues in much of
# Europe).
pinballmap.stern-army-only=false
